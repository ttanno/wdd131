<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOM Top 10 – Favorite Chapters</title>
  <meta name="description" content="An app to track your favorite Book of Mormon chapters.">
  <meta name="author" content="[Tu Nombre]">
  <link rel="stylesheet" href="styles/bom.css">
  <script src="scripts/bom.js" defer></script>
</head>
<body>
  <header>
    <h1>BOM Top 10</h1>
    <p>Enter your favorite Book of Mormon chapters below.</p>
  </header>

  <main>
    <div class="input-group">
      <label for="favchap">Favorite Chapter</label>
      <input type="text" id="favchap" placeholder="Alma 5">
      <button id="addBtn">Add Chapter</button>
    </div>

    <ul id="chapterList"></ul>
  </main>

  <footer>
    <p>Alessandro Felix</p>
  </footer>
</body>
</html>
