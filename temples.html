<!DOCTYPE html>

  <meta name="description" content="A photo album celebrating the architecture of temples around the world.">

  <!-- Google Fonts -->

    <nav id="primary-nav">

  <main>

    <div class="gallery">
      <figure>

      </figure>

      <figure>
        <img src="images/templos/templo-arequipa.jpg" alt="Arequipa Peru Temple" loading="lazy" width="600" height="400">

      </figure>

      <figure>
        <img src="images/templos/templo-olivos.jpg" alt="Los Olivos Peru Temple" loading="lazy" width="600" height="400">

      <figure>
        <img src="images/templos/templo-guayaquil.jpg" alt="Guayaquil Ecuador Temple" loading="lazy" width="600" height="400">

        <figcaption>Salt Lake Temple</figcaption>
      </figure>
    </div>
  </main>

<footer>
  <p>&copy; <span id="year"></span> Alessandro Felix | Temple Album | Lima, Perú</p>
